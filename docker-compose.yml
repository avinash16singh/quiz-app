version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: quiz-mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-StrongPassword123!}
      MYSQL_DATABASE: quiz_app
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD:-StrongPassword123!}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    image: avinashsingh12/quiz-backend:${IMAGE_TAG:-latest}
    container_name: quiz-backend
    restart: always
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/quiz_app?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: ${MYSQL_ROOT_PASSWORD:-StrongPassword123!}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-AIzaSyBUUsHdpgLEG_7gqyfaq8MGSWHvwFCLBtw}
    depends_on:
      mysql:
        condition: service_healthy

  frontend:
    image: avinashsingh12/quiz-frontend:${IMAGE_TAG:-latest}
    container_name: quiz-frontend
    restart: always
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  mysql_data:
